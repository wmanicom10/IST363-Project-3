<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>IST363 Project 3</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="styles.css">
        <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    </head>
    <body class="bg-[#0d0f14] font-['Barlow',sans-serif] text-[#f0f2f7]">

        <!-- Header -->
        <header class="flex justify-between items-center border-b border-[rgba(255,255,255,0.07)] px-[40px] py-[10px]">
            <h1 class="text-[#f0f2f7] text-[1.6rem]">Title</h1>
            <nav>
                <a href="index.html" class="text-[#6b7280] mx-[5px] py-[10px] px-[15px] rounded-[5px]">Home</a>
                <a href="leagues.html" class="text-[#6b7280] mx-[5px] py-[10px] px-[15px] rounded-[5px]">Leagues</a>
                <a href="my-teams.html" class="text-[#3b82f6] bg-[rgba(59,130,246,0.12)] mx-[5px] py-[10px] px-[15px] rounded-[5px]">My Teams</a>
            </nav>
        </header>

        <main class="py-[30px] px-[40px]">
            <div class="mb-[24px]">
                <h2 class="text-[#f0f2f7] text-[1.6rem]">My Teams</h2>
                <p class="text-[#6b7280] mt-[4px]">Manage what teams show up on the home page.</p>
            </div>
            <div class="flex gap-[12px] mb-[28px]">
                <span class="border border-[rgba(255,255,255,0.07)] text-[#3b82f6] bg-[rgba(59,130,246,0.12)] px-[16px] py-[6px] rounded-[5px] cursor-pointer league-selector">NFL</span>
                <span class="px-[16px] py-[6px] rounded-[5px] border border-[rgba(255,255,255,0.07)] text-[#f0f2f7] bg-[#151820] cursor-pointer league-selector">NBA</span>
                <span class="px-[16px] py-[6px] rounded-[5px] border border-[rgba(255,255,255,0.07)] text-[#f0f2f7] bg-[#151820] cursor-pointer league-selector">MLB</span>
                <span class="px-[16px] py-[6px] rounded-[5px] border border-[rgba(255,255,255,0.07)] text-[#f0f2f7] bg-[#151820] cursor-pointer league-selector">NHL</span>
                <span class="px-[16px] py-[6px] rounded-[5px] border border-[rgba(255,255,255,0.07)] text-[#f0f2f7] bg-[#151820] cursor-pointer league-selector">MLS</span>
            </div>
            <p class="text-[#6b7280] mb-[12px]">Your Favorites (0)</p>
            <div class="grid grid-cols-3 gap-[12px] mb-[28px]">
                <div class="bg-[#151820] border border-[rgba(255,255,255,0.07)] rounded-[10px] px-[16px] py-[12px] flex items-center gap-[12px] fav-team-card">
                    <img src="images/atlanta-braves-logo.png" class="w-[44px] h-[44px] object-contain flex-shrink-0">
                    <div class="flex-1">
                        <p class="text-[#f0f2f7] font-medium">Team Name</p>
                        <p class="text-[#6b7280]">League</p>
                    </div>
                    <button class="text-[#6b7280] remove-btn">✕</button>
                </div>
                <div class="bg-[#151820] border border-[rgba(255,255,255,0.07)] rounded-[10px] px-[16px] py-[12px] flex items-center gap-[12px] fav-team-card">
                    <img src="images/atlanta-braves-logo.png" class="w-[44px] h-[44px] object-contain flex-shrink-0">
                    <div class="flex-1">
                        <p class="text-[#f0f2f7] font-medium">Team Name</p>
                        <p class="text-[#6b7280]">League</p>
                    </div>
                    <button class="text-[#6b7280] remove-btn">✕</button>
                </div>
                <div class="bg-[#151820] border border-[rgba(255,255,255,0.07)] rounded-[10px] px-[16px] py-[12px] flex items-center gap-[12px] fav-team-card">
                    <img src="images/atlanta-braves-logo.png" class="w-[44px] h-[44px] object-contain flex-shrink-0">
                    <div class="flex-1">
                        <p class="text-[#f0f2f7] font-medium">Team Name</p>
                        <p class="text-[#6b7280]">League</p>
                    </div>
                    <button class="text-[#6b7280] remove-btn">✕</button>
                </div>
                <div class="bg-[#151820] border border-[rgba(255,255,255,0.07)] rounded-[10px] px-[16px] py-[12px] flex items-center gap-[12px] fav-team-card">
                    <img src="images/atlanta-braves-logo.png" class="w-[44px] h-[44px] object-contain flex-shrink-0">
                    <div class="flex-1">
                        <p class="text-[#f0f2f7] font-medium">Team Name</p>
                        <p class="text-[#6b7280]">League</p>
                    </div>
                    <button class="text-[#6b7280] remove-btn">✕</button>
                </div>
                <div class="bg-[#151820] border border-[rgba(255,255,255,0.07)] rounded-[10px] px-[16px] py-[12px] flex items-center gap-[12px] fav-team-card">
                    <img src="images/atlanta-braves-logo.png" class="w-[44px] h-[44px] object-contain flex-shrink-0">
                    <div class="flex-1">
                        <p class="text-[#f0f2f7] font-medium">Team Name</p>
                        <p class="text-[#6b7280]">League</p>
                    </div>
                    <button class="text-[#6b7280] remove-btn">✕</button>
                </div>
            </div>
            <div class="border border-dashed border-[rgba(255,255,255,0.14)] rounded-[10px] py-[28px] px-[20px] text-center">
                <p class="text-[#f0f2f7] mb-[6px]">Add more teams</p>
                <p class="text-[#6b7280] mb-[18px]">Search across all sports and leagues to find your teams.</p>
                <div class="flex justify-center gap-[8px]">
                    <input type="text" placeholder="Search teams..." class="bg-[#151820] border border-[rgba(255,255,255,0.07)] rounded-[8px] px-[14px] py-[8px] text-[#f0f2f7] w-[280px]">
                    <button class="bg-[#151820] border border-[rgba(255,255,255,0.07)] rounded-[8px] px-[18px] py-[8px] text-[#6b7280] search-btn">Search</button>
                </div>
            </div>
        </main>

    </body>
</html>
